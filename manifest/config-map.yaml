# 1. ConfigMap for Nginx Reverse Proxy Settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      server {
        listen 80;
        location / {
          proxy_pass http://localhost:3030; # Nginx talks to Express over localhost
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
