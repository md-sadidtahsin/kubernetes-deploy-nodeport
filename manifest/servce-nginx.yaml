# 3. Service: NodePort (Exposing Nginx)
apiVersion: v1
kind: Service
metadata:
  name: express-nodeport-service
spec:
  type: NodePort
  selector:
    app: express-web
  ports:
    - protocol: TCP
      port: 80         # Port accessible inside the cluster
      targetPort: 80   # Port Nginx is listening on
      nodePort: 30080  # Port accessible outside (Range: 30000-32767)
